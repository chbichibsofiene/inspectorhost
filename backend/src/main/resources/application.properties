# ===== Server =====
server.port=${PORT:8081}
server.address=0.0.0.0

# ===== MySQL DataSource =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/inspector_system_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== HikariCP (Connection Pool) =====
# Optimized for production (handle more concurrent users)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=InspectorHikariCP

# ===== JPA / Hibernate =====
# In production, use 'none' or 'validate' and manage migrations with Flyway
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.auto_quote_keyword=true
spring.jpa.properties.hibernate.format_sql=false

# ===== Flyway (Database Migrations) =====
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===== Caching (Caffeine) =====
spring.cache.type=caffeine
spring.cache.cache-names=users,courses,profiles,subjects
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

# ===== Actuator (Monitoring) =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Show details always so the dashboard and UptimeRobot can see which component is healthy
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ===== Health Indicators =====
# Disable mail health check — Gmail SMTP connections are flaky on Render and cause
# false DOWN status even when the app is fully functional.
management.health.mail.enabled=false
# Disable diskSpace health — meaningless on Render's ephemeral container filesystem
management.health.diskspace.enabled=false

# ===== JWT =====
# CRITICAL: Always set a long random APP_JWT_SECRET in your production environment!
app.jwt.secret=${APP_JWT_SECRET:9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f9a8b}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION:86400000}

# ===== CORS =====
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:3000,http://localhost}

# ===== Logging =====
logging.level.com.inspector=${LOGGING_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_SECURITY:INFO}

# ===== Gemini AI Config =====
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.base-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# ===== Email API Configuration (Brevo) =====
app.brevo.api-key=${BREVO_API_KEY:}

# ===== SMTP Mail Configuration =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:cnte.inspector.noreply@gmail.com}
spring.mail.password=${MAIL_PASSWORD:jqty rzpa twzc fqyq}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

# Add timeouts (in milliseconds) so it doesn't hang forever if the port is blocked
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===== File Upload Limits =====
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}

